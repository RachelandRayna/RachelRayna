<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Tune | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6D28D9;
            --purple-light: #F5F3FF;
            --gold: #D4AF37;
            --bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #F3F4F6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; letter-spacing: -0.01em; overflow: hidden; }

        header { padding: 40px 20px 10px; text-align: center; flex-shrink: 0; }
        header h1 { font-size: 36px; margin: 0; color: var(--purple); font-weight: 800; letter-spacing: -0.04em; }
        header p { margin: 2px 0 0; color: var(--gold); text-transform: uppercase; font-weight: 700; font-size: 10px; letter-spacing: 0.3em; }

        main { flex: 1; overflow-y: auto; padding: 0 20px 100px; }
        .view { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .view.active { display: block; }

        /* SPLIT SCREEN LAYOUT */
        .split-container { display: flex; gap: 30px; margin-top: 20px; }
        .split-col { flex: 1; min-width: 300px; }
        
        @media (max-width: 768px) {
            .split-container { flex-direction: column; gap: 10px; }
        }

        .page-title { font-size: 22px; font-weight: 800; margin: 20px 0 15px; color: var(--text-main); border-left: 4px solid var(--purple); padding-left: 12px; }
        .cat-group { margin-bottom: 24px; }
        .cat-label { font-size: 10px; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; display: block; opacity: 0.8; }

        /* CLEANER CARDS (NO BOXES) */
        .card { 
            background: var(--purple-light); 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: transform 0.2s ease;
        }
        .card h3 { margin: 0; font-size: 15px; font-weight: 700; color: var(--purple); }
        .card p { margin: 2px 0 0; font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .pill { font-size: 10px; font-weight: 700; background: white; padding: 5px 10px; border-radius: 6px; color: var(--purple); white-space: nowrap; }

        /* CALENDAR */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: white; }
        .cal-h { background: var(--purple-light); border-bottom: 1px solid var(--border); padding: 12px 0; text-align: center; font-size: 9px; font-weight: 800; color: var(--purple); }
        .cal-d { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 80px; padding: 6px; }
        .cal-num { font-size: 11px; font-weight: 600; color: #9CA3AF; }
        .cal-d.today { background: #FAF9FF; }
        .cal-tag { background: var(--purple); color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; margin-top: 4px; display: block; font-weight: 600; }

        /* NAV */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px; 
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; 
            align-items: center; padding-bottom: 10px; z-index: 1000;
        }
        .nav-btn { border: none; background: none; color: #9CA3AF; font-size: 9px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-btn.active { color: var(--purple); }
        .nav-indicator { width: 12px; height: 3px; border-radius: 10px; background: transparent; }
        .active .nav-indicator { background: var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>In Tune</h1>
    <p>Central Music Portal</p>
</header>

<main>
    <div id="view-sched" class="view active">
        <div class="split-container">
            <div class="split-col">
                <div class="page-title" id="label-today">Today</div>
                <div id="list-today"></div>
            </div>
            <div class="split-col">
                <div class="page-title" id="label-tomorrow">Tomorrow</div>
                <div id="list-tomorrow"></div>
            </div>
        </div>
    </div>

    <div id="view-cal" class="view">
        <div class="page-title" id="month-name">Calendar</div>
        <div class="cal-grid" id="calendar-body">
            <div class="cal-h">SUN</div><div class="cal-h">MON</div><div class="cal-h">TUE</div><div class="cal-h">WED</div><div class="cal-h">THU</div><div class="cal-h">FRI</div><div class="cal-h">SAT</div>
        </div>
    </div>

    <div id="view-res" class="view">
        <div class="page-title">Resources</div>
        <div style="text-align: center; padding: 50px; color: var(--text-muted); font-size: 14px;">
            Content library is being curated.
        </div>
    </div>

    <div id="view-vol" class="view">
        <div class="page-title">Get Involved</div>
        <div class="card">
            <div class="card-info"><h3>Music Council</h3><p>Executive Roles</p></div>
            <div class="pill">Info</div>
        </div>
        <div class="card">
            <div class="card-info"><h3>Volunteering</h3><p>Earn hours</p></div>
            <div class="pill">Sign Up</div>
        </div>
    </div>
</main>

<nav>
    <button class="nav-btn active" onclick="switchTab('view-sched', this)">HOME<div class="nav-indicator"></div></button>
    <button class="nav-btn" onclick="switchTab('view-cal', this)">CALENDAR<div class="nav-indicator"></div></button>
    <button class="nav-btn" onclick="switchTab('view-res', this)">RESOURCES<div class="nav-indicator"></div></button>
    <button class="nav-btn" onclick="switchTab('view-vol', this)">JOIN<div class="nav-indicator"></div></button>
</nav>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyU9Ns94s1Qj3QLmMpMahY3TKvYEtZsOe-KIHw7yEU82gJDTgLrMELkzGZRPSKvmjWg-Y_X0NDfgNL/pub?gid=317537579&single=true&output=csv";
    
    let schedule = { 0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[] };
    const bigEvents = { 18: "Symphony Night", 24: "Variety Is" };

    async function fetchData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).slice(1); 
            const newSched = { 0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[] };

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 5) {
                    const d = cols[0].replace(/"/g, "").trim();
                    if (newSched[d]) {
                        newSched[d].push({
                            cat: cols[1].replace(/"/g, "").trim(),
                            name: cols[2].replace(/"/g, "").trim(),
                            time: cols[3].replace(/"/g, "").trim(),
                            room: cols[4].replace(/"/g, "").trim()
                        });
                    }
                }
            });
            schedule = newSched;
            refreshUI();
        } catch (e) { console.error(e); refreshUI(); }
    }

    function renderDay(day, containerId) {
        const container = document.getElementById(containerId);
        const dayData = schedule[day] || [];
        if (dayData.length === 0) {
            container.innerHTML = '<p style="color:#9CA3AF; font-size:12px; font-style:italic; padding:10px;">No rehearsals scheduled</p>';
            return;
        }

        // IMPROVED FUZZY GROUPING
        const cats = ["Before School", "Lunch", "After School"];
        let html = '';
        cats.forEach(label => {
            const keyword = label.toLowerCase().split(' ').pop(); // grabs "school" or "lunch"
            const filtered = dayData.filter(i => i.cat.toLowerCase().includes(keyword));
            
            if (filtered.length > 0) {
                html += `<div class="cat-group"><span class="cat-label">${label}</span>`;
                filtered.forEach(item => {
                    html += `<div class="card"><div class="card-info"><h3>${item.name}</h3><p>Room ${item.room}</p></div><div class="pill">${item.time}</div></div>`;
                });
                html += `</div>`;
            }
        });
        container.innerHTML = html || '<p style="color:#9CA3AF; font-size:12px;">No rehearsals scheduled</p>';
    }

    function buildCalendar() {
        const now = new Date();
        const startDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const grid = document.getElementById('calendar-body');
        document.getElementById('month-name').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' });
        
        while(grid.children.length > 7) grid.removeChild(grid.lastChild);
        for(let i=0; i<startDay; i++) grid.innerHTML += '<div class="cal-d"></div>';
        for(let d=1; d<=totalDays; d++) {
            const isToday = d === now.getDate() ? 'today' : '';
            const event = bigEvents[d] ? `<span class="cal-tag">${bigEvents[d]}</span>` : '';
            grid.innerHTML += `<div class="cal-d ${isToday}"><span class="cal-num">${d}</span>${event}</div>`;
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
    }

    function refreshUI() {
        const d = new Date();
        const names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        document.getElementById('label-today').innerText = names[d.getDay()];
        document.getElementById('label-tomorrow').innerText = names[(d.getDay()+1)%7];
        renderDay(d.getDay(), 'list-today');
        renderDay((d.getDay()+1)%7, 'list-tomorrow');
        buildCalendar();
    }

    fetchData();
</script>
</body>
</html>
