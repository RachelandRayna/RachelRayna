<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Tune | Sync Active</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #6D28D9; --purple-light: #F5F3FF; --gold: #D4AF37; --text-main: #111827; --text-muted: #6B7280; --border: #F3F4F6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #FFF; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Debugger bar - will show if there is an error */
        #status-bar { background: #fee2e2; color: #b91c1c; font-size: 10px; padding: 5px; text-align: center; display: none; font-weight: bold; }

        header { padding: 30px 20px 10px; text-align: center; flex-shrink: 0; }
        header h1 { font-size: 32px; margin: 0; color: var(--purple); font-weight: 800; letter-spacing: -0.04em; }
        header p { margin: 2px 0 0; color: var(--gold); text-transform: uppercase; font-weight: 700; font-size: 10px; letter-spacing: 0.3em; }

        main { flex: 1; overflow-y: auto; padding: 0 20px 100px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }

        /* FORCED SIDE BY SIDE */
        .split-container { display: flex; flex-direction: row; gap: 20px; align-items: flex-start; margin-top: 10px; width: 100%; }
        .split-col { flex: 1; min-width: 0; } /* min-width 0 prevents flex items from overflowing */
        
        @media (max-width: 650px) { 
            .split-container { flex-direction: column; gap: 0; } 
        }

        .page-title { font-size: 20px; font-weight: 800; margin: 20px 0 15px; border-left: 4px solid var(--purple); padding-left: 12px; }
        .cat-label { font-size: 10px; font-weight: 800; color: var(--gold); text-transform: uppercase; margin: 15px 0 8px; display: block; }

        .card { background: var(--purple-light); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; border: 1px solid rgba(109, 40, 217, 0.05); }
        .card h3 { margin: 0; font-size: 14px; font-weight: 700; color: var(--purple); }
        .card p { margin: 2px 0 0; font-size: 11px; color: var(--text-muted); }
        .pill { font-size: 10px; font-weight: 700; background: white; padding: 4px 8px; border-radius: 6px; color: var(--purple); }

        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; }
        .nav-btn { border: none; background: none; color: #9CA3AF; font-size: 9px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--purple); }
        .nav-indicator { width: 12px; height: 3px; border-radius: 10px; background: transparent; margin: 4px auto 0; }
        .active .nav-indicator { background: var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="status-bar">Syncing Data...</div>

<header>
    <h1>In Tune</h1>
    <p>Central Music Portal</p>
</header>

<main>
    <div id="view-sched" class="view active">
        <div class="split-container">
            <div class="split-col">
                <div class="page-title" id="label-today">Today</div>
                <div id="list-today"></div>
            </div>
            <div class="split-col">
                <div class="page-title" id="label-tomorrow">Tomorrow</div>
                <div id="list-tomorrow"></div>
            </div>
        </div>
    </div>
    <div id="view-cal" class="view"><div class="page-title">Calendar</div><div id="calendar-body"></div></div>
    <div id="view-res" class="view"><div class="page-title">Resources</div><div id="list-res"></div></div>
    <div id="view-vol" class="view"><div class="page-title">Committees</div><div id="list-vol"></div></div>
</main>

<nav>
    <button class="nav-btn active" onclick="switchTab('view-sched', this)">HOME<div class="nav-indicator"></div></button>
    <button class="nav-btn" onclick="switchTab('view-res', this)">RESOURCES<div class="nav-indicator"></div></button>
    <button class="nav-btn" onclick="switchTab('view-vol', this)">JOIN<div class="nav-indicator"></div></button>
</nav>

<script>
    const LINKS = {
        schedule: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyU9Ns94s1Qj3QLmMpMahY3TKvYEtZsOe-KIHw7yEU82gJDTgLrMELkzGZRPSKvmjWg-Y_X0NDfgNL/pub?gid=317537579&single=true&output=csv",
        committees: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyU9Ns94s1Qj3QLmMpMahY3TKvYEtZsOe-KIHw7yEU82gJDTgLrMELkzGZRPSKvmjWg-Y_X0NDfgNL/pub?gid=1292458613&single=true&output=csv",
        resources: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyU9Ns94s1Qj3QLmMpMahY3TKvYEtZsOe-KIHw7yEU82gJDTgLrMELkzGZRPSKvmjWg-Y_X0NDfgNL/pub?gid=1368638081&single=true&output=csv"
    };

    let store = { schedule: {} };

    async function load() {
        const bar = document.getElementById('status-bar');
        try {
            const res = await fetch(LINKS.schedule + '&cb=' + Date.now());
            if (!res.ok) throw new Error("Google blocked the request");
            const text = await res.text();
            
            // Smarter Parser
            const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            
            const dayMap = {"monday":1,"tuesday":2,"wednesday":3,"thursday":4,"friday":5,"saturday":6,"sunday":0};
            
            rows.slice(1).forEach(cols => {
                if (cols[0]) {
                    let d = cols[0].toLowerCase();
                    let key = dayMap[d] !== undefined ? dayMap[d] : d;
                    if (!store.schedule[key]) store.schedule[key] = [];
                    store.schedule[key].push({ cat: cols[1], name: cols[2], time: cols[3], room: cols[4] });
                }
            });

            render();
        } catch (e) {
            bar.style.display = 'block';
            bar.innerText = "Error: " + e.message + " - Check 'Share' settings in Sheets.";
        }
    }

    function render() {
        const d = new Date();
        const names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        
        document.getElementById('label-today').innerText = names[d.getDay()];
        document.getElementById('label-tomorrow').innerText = names[(d.getDay()+1)%7];

        const draw = (dayKey, containerId) => {
            const cont = document.getElementById(containerId);
            const data = store.schedule[dayKey] || [];
            if (!data.length) { cont.innerHTML = "<p style='font-size:12px; color:#999;'>Nothing scheduled</p>"; return; }

            ["Before School", "Lunch", "After School"].forEach(cat => {
                const items = data.filter(i => i.cat && i.cat.toLowerCase().includes(cat.toLowerCase().split(' ').pop()));
                if (items.length) {
                    html += `<span class="cat-label">${cat}</span>`;
                    items.forEach(i => {
                        html +=
