<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyU9Ns94s1Qj3QLmMpMahY3TKvYEtZsOe-KIHw7yEU82gJDTgLrMELkzGZRPSKvmjWg-Y_X0NDfgNL/pub?gid=317537579&single=true&output=csv";
    let activeFilter = "All";
    
    // This starts as your "Backup" schedule in case the link fails
    let schedule = {
        1: [{c:'Before School', n:"Senior Symphony Orchestra", t:"7-8 AM", r:"126"}],
        2: [{c:'Before School', n:"Junior Orchestra", t:"7-8 AM", r:"126"}, {c:'Before School', n:"Senior Band", t:"7-8 AM", r:"127"}, {c:'After School', n:"Jazz Band", t:"3:30 PM", r:"127"}],
        3: [{c:'Before School', n:"Senior Chamber Orchestra", t:"7-8 AM", r:"126"}],
        4: [{c:'Before School', n:"Intermediate Orchestra", t:"7-8 AM", r:"126"}, {c:'Before School', n:"Junior Band", t:"7-8 AM", r:"127"}, {c:'During Lunch', n:"Junior Chamber", t:"Lunch", r:"126"}],
        5: [{c:'Before School', n:"Senior Band", t:"7-8 AM", r:"127"}],
        0:[], 6:[]
    };

    const monthlyEvents = {
        18: ["Symphony Night"],
        24: ["Jazz Fundraiser"]
    };

    // --- NEW ENGINE START ---
    async function loadSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            
            // This cleans up the CSV and splits it into rows
            const rows = csvText.split(/\r?\n/).slice(1); 
            const newSched = {0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[]};

            rows.forEach(row => {
                // Split by commas but ignore commas inside quotes
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 5) {
                    const dayNum = columns[0].replace(/"/g, "").trim();
                    if (newSched[dayNum]) {
                        newSched[dayNum].push({
                            c: columns[1].replace(/"/g, "").trim(), // Category
                            n: columns[2].replace(/"/g, "").trim(), // Name
                            t: columns[3].replace(/"/g, "").trim(), // Time
                            r: columns[4].replace(/"/g, "").trim()  // Room
                        });
                    }
                }
            });

            // If we got data, replace the backup schedule
            schedule = newSched;
            refresh();
        } catch (error) {
            console.error("Link error or Sheet not published. Using backup.");
            refresh();
        }
    }
    // --- NEW ENGINE END ---

    function renderList(day, targetId) {
        const target = document.getElementById(targetId);
        let items = schedule[day] || [];
        
        if(activeFilter !== "All") {
            items = items.filter(i => i.n.toLowerCase().includes(activeFilter.toLowerCase()));
        }

        if(items.length === 0) { 
            target.innerHTML = '<p style="color:#9CA3AF; font-size:13px; font-style:italic; padding:10px;">No rehearsals scheduled</p>'; 
            return; 
        }

        target.innerHTML = items.map(i => `
            <div class="time-cat">${i.c}</div>
            <div class="card">
                <div class="card-info"><h3>${i.n}</h3><p>Room ${i.r}</p></div>
                <div class="pill">${i.t}</div>
            </div>
        `).join('');
    }

    function buildCalendar() {
        const now = new Date();
        const startDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const grid = document.getElementById('calendar-body');
        
        while(grid.children.length > 7) grid.removeChild(grid.lastChild);
        for(let i=0; i<startDay; i++) grid.innerHTML += '<div class="cal-d"></div>';
        
        for(let d=1; d<=totalDays; d++) {
            const isToday = d === now.getDate() ? 'today' : '';
            const evs = (monthlyEvents[d] || []).map(e => `<span class="cal-tag">${e}</span>`).join('');
            grid.innerHTML += `<div class="cal-d ${isToday}"><span class="cal-num">${d}</span>${evs}</div>`;
        }
    }

    function setFilter(f) {
        activeFilter = f;
        document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.innerText.includes(f)));
        refresh();
    }

    function tab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
    }

    function refresh() {
        const d = new Date();
        const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        document.getElementById('today-title').innerText = `Today (${days[d.getDay()]})`;
        document.getElementById('tomorrow-title').innerText = `Tomorrow (${days[(d.getDay()+1)%7]})`;
        renderList(d.getDay(), 'today-content');
        renderList((d.getDay()+1)%7, 'tomorrow-content');
        buildCalendar();
    }

    // This calls the sheet data as soon as the page loads
    loadSheetData(); 
</script>
